<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - KatsuCases</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="logo">
                    <div class="logo-icon">
                        <i class="ri-gamepad-line"></i>
                    </div>
                    <span>KatsuCases</span>
                </a>
                <h1>Welcome Back</h1>
                <p>Sign in to continue your collection journey</p>
            </div>
            
            <form id="signinForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
                </div>
                
                <div class="form-group">
                    <label class="form-checkbox">
                        <input type="checkbox" id="remember">
                        <span>Remember me for 7 days</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                    <i class="ri-login-box-line"></i> Sign In
                </button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="/signup">Sign up free</a>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.getElementById('signinForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const button = e.target.querySelector('button[type="submit"]');
            
            KatsuCases.setLoading(true, button);
            
            try {
                const data = await KatsuCases.api.post('/api/auth/login', { email, password });
                
                KatsuCases.showToast('Welcome back!', 'success');
                KatsuCases.updateUserUI(data.user);
                
                // Redirect to previous page or home
                const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
                window.location.href = redirect;
            } catch (error) {
                KatsuCases.showToast(error.message || 'Login failed', 'error');
            } finally {
                KatsuCases.setLoading(false, button);
            }
        });
    </script>
</body>
</html>
