<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - KatsuCases</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
    <div class="page-wrapper">
        <header class="header">
            <div class="header-inner">
                <a href="/" class="logo">
                    <div class="logo-icon"><i class="ri-gamepad-line"></i></div>
                    <span>KatsuCases</span>
                </a>
                
                <nav class="nav">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/cases" class="nav-link">Cases</a>
                    <a href="/marketplace" class="nav-link">Marketplace</a>
                    <a href="/trading" class="nav-link">Trading</a>
                    <a href="/livepulls" class="nav-link">Live Pulls</a>
                    <a href="/guide" class="nav-link">Info</a>
                </nav>
                
                <div class="header-actions">
                    <div class="balance-display">
                        <i class="ri-wallet-3-line"></i>
                        <span class="balance-value">$0.00</span>
                    </div>
                    <div class="user-area">
                        <a href="/inventory" class="btn btn-icon btn-ghost"><i class="ri-archive-line"></i></a>
                        <div class="user-menu">
                            <div class="user-menu-trigger">
                                <div class="user-avatar"><span class="user-initial">U</span></div>
                                <span class="user-name">Username</span>
                            </div>
                            <div class="user-menu-dropdown">
                                <a href="/profile" class="user-menu-item"><i class="ri-user-line"></i> Profile</a>
                                <a href="/inventory" class="user-menu-item"><i class="ri-archive-line"></i> Inventory</a>
                                <a href="#" class="user-menu-item" onclick="KatsuCases.logout(); return false;"><i class="ri-logout-box-line"></i> Logout</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        
        <main class="main-content">
            <section class="section-sm">
                <div class="container">
                    <div class="inventory-header">
                        <div class="section-title" style="text-align: left; margin-bottom: 0;">
                            <h1>My Inventory</h1>
                            <p>Manage your collected Pokémon items</p>
                        </div>
                        <a href="/cases" class="btn btn-primary">
                            <i class="ri-gamepad-line"></i> Open More Cases
                        </a>
                    </div>
                    
                    <div class="inventory-stats" id="inventoryStats">
                        <div class="inventory-stat">
                            <div class="inventory-stat-value" id="totalItems">0</div>
                            <div class="inventory-stat-label">Total Items</div>
                        </div>
                        <div class="inventory-stat">
                            <div class="inventory-stat-value" id="totalListed">0</div>
                            <div class="inventory-stat-label">Listed</div>
                        </div>
                        <div class="inventory-stat">
                            <div class="inventory-stat-value" id="totalValue">$0</div>
                            <div class="inventory-stat-label">Est. Value</div>
                        </div>
                    </div>
                    
                    <div class="inventory-filters">
                        <div class="inventory-toolbar" style="display:grid; grid-template-columns: minmax(0,1fr) 220px; gap:12px; width:100%; margin-bottom:14px;">
                            <input id="inventorySearch" class="input" placeholder="Search your inventory">
                            <select id="inventorySort" class="input">
                                <option value="recent">Newest First</option>
                                <option value="value_desc">Highest Value</option>
                                <option value="value_asc">Lowest Value</option>
                                <option value="name">Name A-Z</option>
                                <option value="rarity">Best Rarity</option>
                            </select>
                        </div>
                        <div class="pills" id="rarityPills">
                            <button class="pill active" data-filter="all">All</button>
                            <button class="pill" data-filter="common">Common</button>
                            <button class="pill" data-filter="uncommon">Uncommon</button>
                            <button class="pill" data-filter="rare">Rare</button>
                            <button class="pill" data-filter="epic">Epic</button>
                            <button class="pill" data-filter="legendary">Legendary</button>
                            <button class="pill" data-filter="mythical">Mythical</button>
                        </div>
                        
                        <div class="pills" id="statusPills">
                            <button class="pill active" data-filter="all">All Items</button>
                            <button class="pill" data-filter="listed">Listed</button>
                            <button class="pill" data-filter="unlisted">Not Listed</button>
                        </div>
                    </div>
                    
                    <div class="inventory-grid" id="inventoryGrid">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </section>
        </main>
        
        <footer class="footer">
            <div class="container">
                <div class="footer-bottom" style="border-top: none; padding-top: 0;">
                    <p>&copy; 2024 KatsuCases. All rights reserved.</p>
                </div>
            </div>
        </footer>
    </div>
    
    <!-- List Item Modal -->
    <div class="modal-overlay" id="list-modal">
        <div class="modal" style="max-width: 400px;">
            <div class="modal-header">
                <h3 class="modal-title">List Item</h3>
                <button class="modal-close" onclick="KatsuCases.closeModal('list-modal')">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="modal-body">
                <div style="text-align: center; margin-bottom: 24px;">
                    <img id="listItemSprite" src="" style="width: 100px; height: 100px; image-rendering: pixelated;">
                    <h4 id="listItemName" style="margin-top: 12px;"></h4>
                    <span id="listItemRarity" class="badge"></span>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Listing Price (USD)</label>
                    <input type="number" class="form-input" id="listPrice" placeholder="0.00" step="0.01" min="0.01">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" onclick="KatsuCases.closeModal('list-modal')">Cancel</button>
                <button class="btn btn-primary" onclick="confirmListItem()">List Item</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
    <script src="/js/main.js"></script>
    <script>
        let inventoryData = [];
        let currentListItem = null;
        
        async function loadInventory() {
            try {
                const data = await KatsuCases.api.get('/api/inventory');
                inventoryData = data.items || [];
                renderInventory();
                updateStats();
            } catch (error) {
                console.error('Failed to load inventory:', error);
                KatsuCases.showToast('Failed to load inventory', 'error');
            }
        }
        
        function renderInventory(items = inventoryData) {
            const grid = document.getElementById('inventoryGrid');
            
            if (items.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <i class="ri-archive-line"></i>
                        <h3>No items yet</h3>
                        <p>Open some cases to start your collection!</p>
                        <a href="/cases" class="btn btn-primary" style="margin-top: 16px;">Browse Cases</a>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = items.map(item => `
                <div class="inventory-item rarity-glow-${item.rarity}" onclick="showItemActions(${item.id})">
                    ${item.is_listed ? '<span class="inventory-item-listed">LISTED</span>' : ''}
                    <div class="inventory-item-sprite">
                        ${KatsuCases.buildSpriteImg({ pokemonName: item.pokemon_name, isShiny: item.is_shiny, spriteUrl: item.sprite_url, alt: item.pokemon_name })}
                    </div>
                    <div class="inventory-item-info">
                        <div class="inventory-item-name">${item.pokemon_name}</div>
                        ${item.is_shiny ? '<span style="color: var(--rarity-legendary); font-size: 10px;">SHINY</span>' : ''}
                        <div class="inventory-item-price">Est. ${KatsuCases.formatCurrency(item.estimated_value || 0)}</div>
                        ${item.case_name ? `<div style="font-size:11px; color: var(--text-secondary); margin-top:4px;">From ${KatsuCases.escapeHtml(item.case_name)}</div>` : ''}
                        ${item.original_owner_username ? `<div style="font-size:11px; color: var(--text-muted); margin-top:6px;">Original owner · <a href="/profile?user=${encodeURIComponent(item.original_owner_username)}">${KatsuCases.escapeHtml(item.original_owner_username)}</a></div>` : ''}
                        ${item.is_listed ? `
                            <div style="font-size: 12px; color: var(--accent-primary); margin-top: 6px;">Listed for ${KatsuCases.formatCurrency(item.listed_price)}</div>
                        ` : `
                            <div style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">Not listed</div>
                        `}
                    </div>
                </div>
            `).join('');
        }
        
        function updateStats() {
            const total = inventoryData.length;
            const listed = inventoryData.filter(i => i.is_listed).length;
            const value = inventoryData.reduce((sum, i) => sum + Number(i.estimated_value || 0), 0);
            
            document.getElementById('totalItems').textContent = total;
            document.getElementById('totalListed').textContent = listed;
            document.getElementById('totalValue').textContent = KatsuCases.formatCurrency(value);
        }
        
        function showItemActions(itemId) {
            const item = inventoryData.find(i => i.id === itemId);
            if (!item) return;
            
            if (item.is_listed) {
                if (confirm(`Remove "${item.pokemon_name}" from marketplace?`)) {
                    removeListing(itemId);
                }
            } else {
                currentListItem = item;
                document.getElementById('listItemSprite').src = KatsuCases.resolveSpriteUrl(item.sprite_url, item.pokemon_name);
                KatsuCases.applySpriteState(document.getElementById('listItemSprite'), item.is_shiny, item.sprite_url, item.pokemon_form);
                document.getElementById('listItemName').textContent = item.pokemon_name + (item.pokemon_form ? ` (${item.pokemon_form})` : '');
                document.getElementById('listItemRarity').textContent = item.rarity.toUpperCase();
                document.getElementById('listItemRarity').className = `badge badge-${item.rarity}`;
                document.getElementById('listPrice').value = '';
                KatsuCases.openModal('list-modal');
            }
        }
        
        async function confirmListItem() {
            if (!currentListItem) return;
            
            const price = parseFloat(document.getElementById('listPrice').value);
            if (!price || price <= 0) {
                KatsuCases.showToast('Please enter a valid price', 'error');
                return;
            }
            
            try {
                await KatsuCases.api.post('/api/marketplace/list', {
                    itemId: currentListItem.id,
                    price: price
                });
                
                KatsuCases.showToast('Item listed successfully!', 'success');
                KatsuCases.closeModal('list-modal');
                await loadInventory();
                await KatsuCases.refreshNotifications({ silent: true });
            } catch (error) {
                KatsuCases.showToast(error.message || 'Failed to list item', 'error');
            }
        }
        
        async function removeListing(itemId) {
            try {
                await KatsuCases.api.delete(`/api/marketplace/${itemId}`);
                KatsuCases.showToast('Listing removed', 'success');
                await loadInventory();
            } catch (error) {
                KatsuCases.showToast(error.message || 'Failed to remove listing', 'error');
            }
        }
        
        function filterInventory() {
            const rarity = document.querySelector('#rarityPills .pill.active')?.dataset.filter || 'all';
            const status = document.querySelector('#statusPills .pill.active')?.dataset.filter || 'all';
            const search = String(document.getElementById('inventorySearch')?.value || '').trim().toLowerCase();
            const sort = document.getElementById('inventorySort')?.value || 'recent';

            let filtered = [...inventoryData];

            if (rarity !== 'all') {
                filtered = filtered.filter(i => i.rarity === rarity);
            }

            if (status === 'listed') {
                filtered = filtered.filter(i => i.is_listed);
            } else if (status === 'unlisted') {
                filtered = filtered.filter(i => !i.is_listed);
            }

            if (search) {
                filtered = filtered.filter((i) => {
                    const hay = [i.pokemon_name, i.rarity, i.case_name, i.original_owner_username].filter(Boolean).join(' ').toLowerCase();
                    return hay.includes(search);
                });
            }

            filtered.sort((a, b) => {
                switch (sort) {
                    case 'value_desc': return Number(b.estimated_value || 0) - Number(a.estimated_value || 0);
                    case 'value_asc': return Number(a.estimated_value || 0) - Number(b.estimated_value || 0);
                    case 'name': return String(a.pokemon_name || '').localeCompare(String(b.pokemon_name || ''));
                    case 'rarity': {
                        const order = { mythical: 0, legendary: 1, epic: 2, rare: 3, uncommon: 4, common: 5 };
                        return (order[a.rarity] ?? 99) - (order[b.rarity] ?? 99);
                    }
                    default: return String(b.acquired_at || '').localeCompare(String(a.acquired_at || ''));
                }
            });

            renderInventory(filtered);
        }
        
        document.addEventListener('DOMContentLoaded', async () => {
            await KatsuCases.checkAuth();
            await loadInventory();
            
            document.querySelectorAll('#rarityPills .pill, #statusPills .pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    pill.closest('.pills').querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    filterInventory();
                });
            });
            document.getElementById('inventorySearch')?.addEventListener('input', filterInventory);
            document.getElementById('inventorySort')?.addEventListener('change', filterInventory);
        });
    </script>
</body>
</html>
