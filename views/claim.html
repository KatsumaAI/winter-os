<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - KatsuCases</title>
    <meta name="description" content="Set a new KatsuCases password using a one-time reset token or owner-issued OTP.">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="robots" content="noindex,nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
<div class="auth-page auth-page--split">
    <div class="auth-shell">
        <section class="auth-showcase auth-showcase--signup">
            <a href="/" class="auth-brand" aria-label="KatsuCases home">
                <img src="/assets/katsucases-topbar-logo.png" alt="KatsuCases" class="auth-brand-logo">
            </a>
            <div class="auth-showcase-copy">
                <div class="auth-kicker"><span class="live-dot"></span> Password reset</div>
                <h1>Choose a fresh password and lock the account back down.</h1>
                <p>You can use a direct recovery link or an owner-issued OTP from support.</p>
            </div>
        </section>
        <section class="auth-panel">
            <div class="auth-card auth-card--discordish">
                <div class="auth-header auth-header--left">
                    <div class="auth-chip">Reset</div>
                    <h2>Set your new password</h2>
                    <p>If you are using an OTP instead of a link, enter your username or email too.</p>
                </div>
                <form id="resetPasswordForm" class="auth-form auth-form--enhanced">
                    <div class="form-group">
                        <label class="form-label" for="resetIdentifier">Username or Email</label>
                        <div class="auth-input-wrap">
                            <i class="ri-user-line auth-input-icon"></i>
                            <input type="text" class="form-input auth-input" id="resetIdentifier" placeholder="Only needed for OTP resets">
                        </div>
                    </div>
                    <div class="auth-grid-two">
                        <div class="form-group">
                            <label class="form-label" for="resetToken">Reset Token</label>
                            <div class="auth-input-wrap">
                                <i class="ri-links-line auth-input-icon"></i>
                                <input type="text" class="form-input auth-input" id="resetToken" placeholder="Paste token or use the URL automatically">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="resetOtp">OTP Code</label>
                            <div class="auth-input-wrap">
                                <i class="ri-key-2-line auth-input-icon"></i>
                                <input type="text" class="form-input auth-input" id="resetOtp" placeholder="Owner-issued OTP">
                            </div>
                        </div>
                    </div>
                    <div class="auth-grid-two">
                        <div class="form-group">
                            <label class="form-label" for="newPassword">New Password</label>
                            <div class="auth-input-wrap">
                                <i class="ri-lock-2-line auth-input-icon"></i>
                                <input type="password" class="form-input auth-input auth-input--password" id="newPassword" required minlength="6">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="confirmNewPassword">Confirm Password</label>
                            <div class="auth-input-wrap">
                                <i class="ri-shield-check-line auth-input-icon"></i>
                                <input type="password" class="form-input auth-input auth-input--password" id="confirmNewPassword" required minlength="6">
                            </div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg auth-submit"><i class="ri-save-line"></i> Save New Password</button>
                </form>
                <div class="auth-footer auth-footer--compact"><a href="/signin">Back to sign in</a></div>
            </div>
        </section>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
<script src="/js/main.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
if (params.get('token')) document.getElementById('resetToken').value = params.get('token');

document.getElementById('resetPasswordForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const button = event.target.querySelector('button[type="submit"]');
    const password = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmNewPassword').value;
    if (password !== confirmPassword) {
        KatsuCases.showToast('Passwords do not match', 'error');
        return;
    }
    KatsuCases.setLoading(true, button);
    try {
        await KatsuCases.api.post('/api/auth/reset-password', {
            identifier: document.getElementById('resetIdentifier').value.trim(),
            token: document.getElementById('resetToken').value.trim(),
            otp: document.getElementById('resetOtp').value.trim(),
            password
        });
        KatsuCases.showToast('Password updated. You can sign in now.', 'success');
        window.location.href = '/signin';
    } catch (error) {
        KatsuCases.showToast(error.message || 'Reset failed', 'error');
    } finally {
        KatsuCases.setLoading(false, button);
    }
});
</script>
</body>
</html>
